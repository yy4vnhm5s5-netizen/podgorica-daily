name: Work item
description: Propose a bounded, maintainable change
title: ""
labels: []
body:
  - type: textarea
    id: goal
    attributes:
      label: Goal
      description: Describe the outcome and user or operational value.
    validations:
      required: true
  - type: textarea
    id: acceptance-criteria
    attributes:
      label: Acceptance criteria
      description: List observable conditions that define completion.
    validations:
      required: true
  - type: textarea
    id: implementation-notes
    attributes:
      label: Implementation notes
      description: Identify architectural boundaries, risks, and relevant documentation.
  - type: textarea
    id: dependencies
    attributes:
      label: Dependencies
      description: List blocking issues, decisions, providers, or approvals.
